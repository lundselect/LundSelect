<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lund Select</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,600;1,400&family=Caveat:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#f2ede4}
#stage{position:fixed;inset:0;width:100%;height:100%;background:#f2ede4}
.scene{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity 1.2s ease;pointer-events:none}
.scene.active{opacity:1;pointer-events:auto}
.scene svg{width:100%;height:100%;position:absolute;inset:0}

/* Text bubbles */
.bubble{position:absolute;background:#fff;border-radius:18px;padding:10px 15px;font-family:'Caveat',cursive;font-size:clamp(13px,1.6vw,18px);line-height:1.4;box-shadow:0 4px 20px rgba(0,0,0,0.12);opacity:0;transform:translateY(12px) scale(0.92);transition:opacity 0.45s cubic-bezier(0.34,1.56,0.64,1),transform 0.45s cubic-bezier(0.34,1.56,0.64,1);max-width:280px;color:#3a2e28;pointer-events:none;z-index:10}
.bubble::after{content:'';position:absolute;bottom:-8px;left:22px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:9px solid #fff}
.bubble.from-right::after{left:auto;right:22px}
.bubble.show{opacity:1;transform:translateY(0) scale(1)}

/* Scene 3 zoom overlay */
#screen-zoom{position:fixed;inset:0;background:#f4ede4;opacity:0;z-index:50;transition:opacity 0.8s ease}

/* Logo scene */
#scene-logo{z-index:60;background:#f4ede4;display:flex;align-items:center;justify-content:center;flex-direction:column}
#logo-wrap{text-align:center;position:relative}
#logo-lund{font-family:'Bodoni Moda',serif;font-weight:600;font-size:clamp(90px,17vw,210px);color:#b8302a;line-height:0.9;display:block;letter-spacing:0.02em;opacity:0}
#logo-select{font-family:'Bodoni Moda',serif;font-weight:400;font-style:italic;font-size:clamp(52px,9.8vw,118px);color:#82201a;display:block;letter-spacing:0.04em;margin-top:0.08em;opacity:0}
#logo-line{width:180px;height:1px;background:rgba(200,168,136,0.8);margin:18px auto 0;opacity:0;transition:opacity 0.8s ease}
#logo-tagline{font-family:'Caveat',cursive;font-size:clamp(14px,1.8vw,20px);letter-spacing:0.22em;color:#8a7a6a;text-transform:uppercase;margin-top:14px;opacity:0;transition:opacity 1s ease}
#dashed-border{position:absolute;inset:20px;border:1.5px dashed rgba(180,155,120,0.25);border-radius:2px;opacity:0;transition:opacity 1s ease;pointer-events:none;z-index:1}
.corner-mark{position:absolute;font-size:14px;color:rgba(180,155,120,0.4);opacity:0;transition:opacity 1s ease}
.corner-mark.tl{top:28px;left:28px}
.corner-mark.tr{top:28px;right:28px}
.corner-mark.bl{bottom:28px;left:28px}
.corner-mark.br{bottom:28px;right:28px}
.rule-line{position:absolute;left:5%;right:5%;height:1px;border-top:1px dashed rgba(160,138,108,0.15);opacity:0;transition:opacity 1s ease}

/* Progress bar */
#progress{position:fixed;bottom:0;left:0;height:2px;background:#b8302a;width:0%;z-index:200;transition:none}

/* Skip button */
#skip{position:fixed;bottom:18px;right:22px;font-family:'Caveat',cursive;font-size:15px;color:rgba(90,70,55,0.6);cursor:pointer;z-index:200;opacity:0;transition:opacity 0.5s ease;letter-spacing:0.08em;padding:6px 10px;border:1px solid rgba(90,70,55,0.2);border-radius:20px;background:rgba(242,237,228,0.7);backdrop-filter:blur(4px)}
#skip:hover{color:#b8302a;border-color:rgba(184,48,42,0.4)}

/* Letter animation */
.letter-wrap{display:inline-block;position:relative;overflow:visible}
.letter-svg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;pointer-events:none}
</style>
</head>
<body>

<!-- SCENE 1: BEDROOM -->
<div class="scene active" id="scene-bedroom">

<defs>
  <!-- Watercolor displacement for fills -->

    <feTurbulence type="fractalNoise" baseFrequency="0.04 0.03" numOctaves="4" seed="2" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="18" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- Watercolor displacement for lines -->
  <filter id="wc-line" x="-10%" y="-10%" width="120%" height="120%">
    <feTurbulence type="fractalNoise" baseFrequency="0.07 0.05" numOctaves="3" seed="5" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <!-- Paper grain -->
  <filter id="paper-grain" x="0%" y="0%" width="100%" height="100%">
    <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="grain"/>
    <feColorMatrix type="saturate" values="0" in="grain" result="grey"/>
    <feBlend in="SourceGraphic" in2="grey" mode="multiply" result="blend"/>
    <feComposite in="blend" in2="SourceGraphic" operator="in"/>
  </filter>
  <!-- Mushroom lamp glow -->
  <radialGradient id="glow-amber" cx="50%" cy="60%" r="50%">
    <stop offset="0%" stop-color="rgba(255,200,100,0.55)"/>
    <stop offset="40%" stop-color="rgba(255,180,60,0.22)"/>
    <stop offset="100%" stop-color="rgba(255,160,40,0)"/>

  <radialGradient id="glow-window" cx="50%" cy="0%" r="80%">

    <stop offset="100%" stop-color="rgba(255,240,200,0)"/>
  </radialGradient>
  <!-- Wood floor gradient -->
  <linearGradient id="floor-grad" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#c8a878" stop-opacity="0.55"/>
    <stop offset="100%" stop-color="#a07848" stop-opacity="0.75"/>
  </linearGradient>
</defs>

<!-- PROGRESS BAR -->
<div id="progress"></div>
<!-- SKIP BUTTON -->
<div id="skip" onclick="skipToLogo()">skip intro</div>

<script>
// =====================
// TIMING ENGINE
// =====================
const TOTAL_DURATION = 20000; // 20s
let startTime = null;
let animFrame = null;
let skipped = false;

const scenes = {
  bedroom: document.getElementById('scene-bedroom'),
  vanity: document.getElementById('scene-vanity'),
  zoom: document.getElementById('scene-zoom'),
  logo: document.getElementById('scene-logo'),
};

const bubble1 = document.getElementById('bubble1');
const bubble2 = document.getElementById('bubble2');
const bubble3 = document.getElementById('bubble3');
const screenExpand = document.getElementById('screen-expand');
const progress = document.getElementById('progress');
const skip = document.getElementById('skip');

let state = {
  b1: false, b2: false, b3: false,
  vanity: false, zoom: false, logo: false,
  zoomStarted: false, logoStarted: false,
};

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

function tick(now) {
  if (!startTime) startTime = now;
  const t = now - startTime;
  const pct = clamp(t / TOTAL_DURATION, 0, 1);

  // Progress bar
  progress.style.width = (pct * 100) + '%';

  // Show skip after 2.5s
  if (t > 2500 && !skip._shown) {
    skip.style.opacity = '1';
    skip._shown = true;
  }

  // BUBBLE 1: 1.2s
  if (t > 1200 && !state.b1) {
    state.b1 = true;
    bubble1.classList.add('show');
  }

  // BUBBLE 2: 2.8s
  if (t > 2800 && !state.b2) {
    state.b2 = true;
    bubble2.classList.add('show');
  }

  // VANITY: 5.5s
  if (t > 5500 && !state.vanity) {
    state.vanity = true;
    scenes.bedroom.classList.remove('active');
    scenes.vanity.classList.add('active');
  }

  // BUBBLE 3: 7s
  if (t > 7000 && !state.b3) {
    state.b3 = true;
    bubble3.classList.add('show');
  }

  // ZOOM INIT: 11s — show zoom scene and start expanding
  if (t > 11000 && !state.zoomStarted) {
    state.zoomStarted = true;
    scenes.zoom.classList.add('active');
    scenes.zoom.style.opacity = '1';
    // Start the screen expansion
    setTimeout(() => {
      screenExpand.style.opacity = '1';
      // After a brief moment, animate to full screen
      setTimeout(() => {
        screenExpand.style.left = '0';
        screenExpand.style.top = '0';
        screenExpand.style.width = '100%';
        screenExpand.style.height = '100%';
        screenExpand.style.borderRadius = '0';
        screenExpand.style.boxShadow = 'none';
        // Fade out vanity behind
        scenes.vanity.style.opacity = '0';
      }, 200);
    }, 100);
  }

  // LOGO: 14.8s
  if (t > 14800 && !state.logoStarted) {
    state.logoStarted = true;
    startLogoReveal();
  }

  if (pct < 1) {
    animFrame = requestAnimationFrame(tick);
  } else {
    progress.style.width = '100%';
  }
}

function startLogoReveal() {
  // Fade out zoom scene, show logo
  scenes.zoom.style.opacity = '0';
  screenExpand.style.opacity = '0';
  setTimeout(() => { scenes.zoom.classList.remove('active'); }, 800);
  scenes.logo.style.opacity = '';
  scenes.logo.classList.add('active');

  // Animate LUND letters
  const lund = document.getElementById('logo-lund');
  const sel = document.getElementById('logo-select');
  const line = document.getElementById('logo-line');
  const tagline = document.getElementById('logo-tagline');
  const border = document.getElementById('dashed-border');
  const rules = document.querySelectorAll('.rule-line');
  const corners = document.querySelectorAll('.corner-mark');

  // LUND appears with fade + rise per letter using CSS
  lund.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
  lund.style.transform = 'translateY(20px)';

  // Staggered letter reveal using clip/opacity trick with spans
  lund.innerHTML = 'LUND'.split('').map((l,i) =>
    `<span style="display:inline-block;opacity:0;transform:translateY(15px);transition:opacity 0.4s ${0.15+i*0.28}s ease,transform 0.4s ${0.15+i*0.28}s ease">${l}</span>`
  ).join('');
  lund.style.opacity = '1';
  lund.style.transform = 'none';
  lund.style.transition = 'none';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    lund.querySelectorAll('span').forEach(s => {
      s.style.opacity = '1';
      s.style.transform = 'translateY(0)';
    });
  }));

  // SELECT at 1.6s after logo start
  setTimeout(() => {
    sel.innerHTML = 'Select'.split('').map((l,i) =>
      `<span style="display:inline-block;opacity:0;transform:translateY(12px);transition:opacity 0.4s ${i*0.12}s ease,transform 0.4s ${i*0.12}s ease">${l}</span>`
    ).join('');
    sel.style.opacity = '1';
    requestAnimationFrame(() => requestAnimationFrame(() => {
      sel.querySelectorAll('span').forEach(s => {
        s.style.opacity = '1';
        s.style.transform = 'translateY(0)';
      });
    }));
  }, 1600);

  // Decorative line: 2.4s
  setTimeout(() => { line.style.opacity = '1'; }, 2400);

  // Tagline: 3s
  setTimeout(() => { tagline.style.opacity = '1'; }, 3000);

  // Corner marks + border: 3.7s
  setTimeout(() => {
    corners.forEach(c => c.style.opacity = '1');
    border.style.opacity = '1';
    rules.forEach(r => r.style.opacity = '1');
  }, 3700);
}

function skipToLogo() {
  if (skipped) return;
  skipped = true;
  cancelAnimationFrame(animFrame);
  progress.style.width = '100%';
  skip.style.opacity = '0';

  // Hide all non-logo scenes
  ['bedroom','vanity','zoom'].forEach(k => {
    scenes[k].classList.remove('active');
    scenes[k].style.transition = 'none';
    scenes[k].style.opacity = '0';
  });

  // Show logo — clear any inline opacity so CSS class opacity:1 applies
  scenes.logo.style.transition = 'opacity 0.6s ease';
  scenes.logo.style.opacity = '';
  scenes.logo.classList.add('active');

  setTimeout(startLogoReveal, 100);
}

// Start animation
requestAnimationFrame(tick);
</script>
